components:
  securitySchemes:
    sanctum:
      type: apiKey
      in: cookie
      name: laravel_session
    bearer:
      type: http
      scheme: bearer
      bearerFormat: Sanctum scoped access token
  parameters:
    Action:
      in: query
      name: action
      required: false
      schema:
        type: string
      description: Action metier demandee au controleur CRM.
    SiteId:
      in: query
      name: siteId
      required: false
      schema:
        type: integer
      description: Site CRM actif.
  requestBodies:
    CrmJsonPayload:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
  responses:
    CrmOk:
      description: Operation CRM effectuee.
      content:
        application/json:
          schema:
            type: object
            properties:
              ok:
                type: boolean
    BadRequest:
      description: Donnees invalides.
    Unauthorized:
      description: Utilisateur CRM requis.
    Forbidden:
      description: Droits insuffisants.
    NotFound:
      description: Ressource introuvable.
