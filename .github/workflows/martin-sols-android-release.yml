name: Martin Sols Android release

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: Notes affichees dans la proposition de mise a jour
        required: false
        default: Mise a jour Martin Sols.

permissions:
  contents: write

concurrency:
  group: martin-sols-android-release
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Check signing secrets
        env:
          MARTIN_SOLS_ANDROID_KEYSTORE_BASE64: ${{ secrets.MARTIN_SOLS_ANDROID_KEYSTORE_BASE64 }}
          MARTIN_SOLS_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.MARTIN_SOLS_ANDROID_KEYSTORE_PASSWORD }}
          MARTIN_SOLS_ANDROID_KEY_ALIAS: ${{ secrets.MARTIN_SOLS_ANDROID_KEY_ALIAS }}
          MARTIN_SOLS_ANDROID_KEY_PASSWORD: ${{ secrets.MARTIN_SOLS_ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$MARTIN_SOLS_ANDROID_KEYSTORE_BASE64"
          test -n "$MARTIN_SOLS_ANDROID_KEYSTORE_PASSWORD"
          test -n "$MARTIN_SOLS_ANDROID_KEY_ALIAS"
          test -n "$MARTIN_SOLS_ANDROID_KEY_PASSWORD"

      - name: Decode signing key
        env:
          MARTIN_SOLS_ANDROID_KEYSTORE_BASE64: ${{ secrets.MARTIN_SOLS_ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$MARTIN_SOLS_ANDROID_KEYSTORE_BASE64" | base64 --decode > mobile/android/app/martin-sols-release.jks

      - name: Read Android version
        id: version
        run: |
          version_name="$(grep -m1 'versionName' mobile/android/app/build.gradle | sed -E 's/.*"([^"]+)".*/\1/')"
          version_code="$(grep -m1 'versionCode' mobile/android/app/build.gradle | awk '{print $2}')"
          echo "name=$version_name" >> "$GITHUB_OUTPUT"
          echo "code=$version_code" >> "$GITHUB_OUTPUT"
          echo "tag=martin-sols-android-v$version_name" >> "$GITHUB_OUTPUT"
          echo "apk=Martin_Sols_$version_name.apk" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        working-directory: mobile/android
        env:
          MARTIN_SOLS_ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/mobile/android/app/martin-sols-release.jks
          MARTIN_SOLS_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.MARTIN_SOLS_ANDROID_KEYSTORE_PASSWORD }}
          MARTIN_SOLS_ANDROID_KEY_ALIAS: ${{ secrets.MARTIN_SOLS_ANDROID_KEY_ALIAS }}
          MARTIN_SOLS_ANDROID_KEY_PASSWORD: ${{ secrets.MARTIN_SOLS_ANDROID_KEY_PASSWORD }}
        run: ./gradlew --no-daemon clean assembleRelease

      - name: Prepare release asset and manifest
        env:
          VERSION_NAME: ${{ steps.version.outputs.name }}
          VERSION_CODE: ${{ steps.version.outputs.code }}
          TAG_NAME: ${{ steps.version.outputs.tag }}
          APK_NAME: ${{ steps.version.outputs.apk }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          cp mobile/android/app/build/outputs/apk/release/app-release.apk "$APK_NAME"
          apk_sha256="$(sha256sum "$APK_NAME" | awk '{print $1}')"
          apk_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}/${APK_NAME}"

          jq \
            --argjson versionCode "$VERSION_CODE" \
            --arg versionName "$VERSION_NAME" \
            --arg apkUrl "$apk_url" \
            --arg sha256 "$apk_sha256" \
            --arg releaseNotes "$RELEASE_NOTES" \
            '.android.versionCode = $versionCode
              | .android.versionName = $versionName
              | .android.apkUrl = $apkUrl
              | .android.sha256 = $sha256
              | .android.releaseNotes = $releaseNotes' \
            mobile/releases/martin-sols-update.json > mobile/releases/martin-sols-update.json.tmp

          mv mobile/releases/martin-sols-update.json.tmp mobile/releases/martin-sols-update.json

      - name: Commit update manifest
        env:
          VERSION_NAME: ${{ steps.version.outputs.name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mobile/releases/martin-sols-update.json
          git commit -m "Update Martin Sols Android manifest $VERSION_NAME" || true
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.version.outputs.tag }}
          APK_NAME: ${{ steps.version.outputs.apk }}
          VERSION_NAME: ${{ steps.version.outputs.name }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          gh release delete "$TAG_NAME" --yes --cleanup-tag || true
          git tag -f "$TAG_NAME"
          git push origin "$TAG_NAME" --force
          gh release create "$TAG_NAME" "$APK_NAME" --title "Martin Sols Android $VERSION_NAME" --notes "$RELEASE_NOTES"
