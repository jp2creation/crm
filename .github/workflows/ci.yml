name: CI

on:
  push:
  pull_request:

jobs:
  laravel:
    name: Laravel PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: bcmath, ctype, curl, dom, fileinfo, filter, json, mbstring, openssl, pdo, pdo_sqlite, tokenizer, xml
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install Node dependencies
        run: npm ci

      - name: Check frontend sources
        run: |
          npm run typecheck
          npm run lint
          npm run test:unit
          npm run build

      - name: Prepare application
        run: |
          cp .env.example .env
          cat >> .env <<'EOF'
          APP_ENV=testing
          APP_URL=http://127.0.0.1:8000
          DB_CONNECTION=sqlite
          DB_DATABASE=${{ github.workspace }}/database/database.sqlite
          CACHE_STORE=array
          SESSION_DRIVER=array
          SESSION_SECURE_COOKIE=false
          QUEUE_CONNECTION=sync
          MAIL_MAILER=array
          DEBUGBAR_ENABLED=false
          EOF
          touch database/database.sqlite
          php artisan key:generate --ansi
          php artisan migrate --force --ansi

      - name: Run quality checks
        run: composer quality

      - name: Run coverage threshold
        run: composer test:coverage

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        run: npm run test:e2e

  mysql-critical:
    name: MariaDB critical paths
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: crm_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: bcmath, ctype, curl, dom, fileinfo, filter, json, mbstring, openssl, pdo, pdo_mysql, tokenizer, xml
          coverage: none

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare application for MariaDB
        run: |
          cp .env.example .env
          cat >> .env <<'EOF'
          APP_ENV=testing
          APP_URL=http://127.0.0.1:8000
          DB_CONNECTION=mysql
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_DATABASE=crm_test
          DB_USERNAME=root
          DB_PASSWORD=root
          CACHE_STORE=array
          SESSION_DRIVER=array
          SESSION_SECURE_COOKIE=false
          QUEUE_CONNECTION=sync
          MAIL_MAILER=array
          DEBUGBAR_ENABLED=false
          EOF
          php artisan key:generate --ansi
          php artisan config:clear --ansi

      - name: Run MariaDB migrations and critical tests
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: crm_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: composer test:mysql-critical
