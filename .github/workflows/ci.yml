name: CI

on:
  push:
  pull_request:

jobs:
  laravel:
    name: Laravel PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: bcmath, ctype, curl, dom, fileinfo, filter, json, mbstring, openssl, pdo, pdo_sqlite, tokenizer, xml
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install Node dependencies
        run: npm ci

      - name: Check frontend sources
        run: |
          npm run typecheck
          npm run lint
          npm run test:unit
          npm run build

      - name: Prepare application
        run: |
          cp .env.example .env
          cat >> .env <<'EOF'
          APP_ENV=testing
          APP_URL=http://127.0.0.1:8000
          DB_CONNECTION=sqlite
          DB_DATABASE=${{ github.workspace }}/database/database.sqlite
          CACHE_STORE=array
          SESSION_DRIVER=array
          SESSION_SECURE_COOKIE=false
          QUEUE_CONNECTION=sync
          MAIL_MAILER=array
          DEBUGBAR_ENABLED=false
          EOF
          touch database/database.sqlite
          php artisan key:generate --ansi
          php artisan migrate --force --ansi

      - name: Run quality checks
        run: composer quality

      - name: Run coverage threshold
        run: composer test:coverage

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        run: npm run test:e2e
