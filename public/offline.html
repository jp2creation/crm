<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#95002e">
    <title>Hors ligne - Martin Sols CRM</title>
    <style>
      :root {
        color-scheme: light;
        --primary: #95002e;
        --line: #e5e7eb;
        --muted: #64748b;
        --ink: #0f172a;
        --page: #f5f7fb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-height: 100vh;
        min-height: 100dvh;
        margin: 0;
        place-items: center;
        padding: 24px;
        background: var(--page);
        color: var(--ink);
        font-family: "DM Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        display: grid;
        gap: 14px;
        width: min(100%, 420px);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        padding: 22px;
        box-shadow: 0 18px 48px rgba(15, 23, 42, .08);
      }

      img {
        width: 74px;
        height: 74px;
      }

      h1 {
        margin: 0;
        font-size: 1.45rem;
        line-height: 1.15;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-weight: 650;
        line-height: 1.45;
      }

      a {
        display: inline-flex;
        justify-content: center;
        min-height: 42px;
        border-radius: 8px;
        background: var(--primary);
        color: #fff;
        align-items: center;
        padding: 10px 14px;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/assets/pwa/icon-192.png" alt="Martin Sols">
      <h1>Connexion indisponible</h1>
      <p>Le CRM a besoin d'une connexion pour afficher les données à jour. Réessayez dès que le réseau revient.</p>
      <a href="/">Réessayer</a>
    </main>
  </body>
</html>
