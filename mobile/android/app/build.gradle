apply plugin: 'com.android.application'

def martinSolsKeystorePath = System.getenv("MARTIN_SOLS_ANDROID_KEYSTORE_PATH")
def hasMartinSolsReleaseSigning = martinSolsKeystorePath != null && martinSolsKeystorePath.trim()

android {
    namespace = "fr.martinsols.crm"
    compileSdk = rootProject.ext.compileSdkVersion
    buildFeatures {
        buildConfig = true
    }
    signingConfigs {
        release {
            if (hasMartinSolsReleaseSigning) {
                storeFile file(martinSolsKeystorePath)
                storePassword System.getenv("MARTIN_SOLS_ANDROID_KEYSTORE_PASSWORD")
                keyAlias System.getenv("MARTIN_SOLS_ANDROID_KEY_ALIAS")
                keyPassword System.getenv("MARTIN_SOLS_ANDROID_KEY_PASSWORD")
            }
        }
    }
    defaultConfig {
        applicationId "fr.martinsols.crm"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 56
        versionName "1.54"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            if (hasMartinSolsReleaseSigning) {
                signingConfig signingConfigs.release
            }
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

dependencies {
}
